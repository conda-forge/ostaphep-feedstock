schema_version: 1

context:
  name: OstapHEP
  version: "3.7.0.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/OstapHEP/ostap/archive/v${{ version }}.tar.gz
  sha256: e31535f4bdf8a40fc778eb17c683827cc4c677d5acc2f3f1eab21a0a83b9b413
  target_directory: ostap
  patches:
    - 0001-fix-executables-path.patch

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - cmake
    - make
    - ninja
    - pip
    - python
  host:
    - root_base
    - root_cxx_standard
    - python
    - gsl
    - scipy
    - numpy
    - pip
  run:
    - python
    - ipython
    - root_base
    - gsl
    - scipy
    - numpy
    - cffi
    - pathos
    - dill
    - multiprocess
    - ppft
    - joblib
    - ipyparallel
    - zstandard
    - more-itertools
    - sortedcontainers
    - psutil
    - tabulate
    - terminaltables
    - libdb
    - parallel

tests:
  - python:
      imports:
        - ostap
        - ostap.core.core
        - ostap.core.pyrouts

about:
  license: BSD-3-Clause
  license_file: ostap/LICENSE
  summary: >
    The Ostap project is a community-driven initiative aiming to provide more
    user friendly and more intuitive interface to ROOT and PyROOT and extending
    the existing functionality.
  homepage: https://github.com/OstapHEP/ostap
  repository: https://github.com/OstapHEP/ostap

extra:
  recipe-maintainers:
    - TatianaOvsiannikova
    - VanyaBelyaev
